  - title: "Human Capital Exiting Capitol Hill? Differences in Congressional Staff Turnover by Race and Gender"
    authors: "Bolton, Alexander, Hans Hassell, and Joshua McCrain"
    journal: "Legislative Studies Quarterly"
    year: 2025
    doi: "https://doi.org/10.1111/lsq.70030"
    preprint: ""
    abstract: "ABSTRACT Congress relies heavily on congressional staff to function and, as such, members have raised alarms about staff departures and their impact on the institution's capacity. We examine patterns of congressional staff exit to understand the severity of this problem. We document differences in departure rates among staff from certain demographic groups, as staff diversity shapes substantive representation. Using comprehensive congressional staffing employment data over the past two decades, we show turnover rates vary by race and gender, with minorities more likely to exit their positions and women, despite being less likely to be promoted, more likely to stay. Lastly, while overall turnover rates are high, we find that staff with higher education and committee experience (whose departures are more likely to affect brain drain) are more likely to remain in Congress. These results hold important implications for ongoing policy reforms and for descriptive representation in congressional policymaking."
    discipline: "Political Science"
    keywords:
      - "Legislative Politics"
      - "Representation"
    methods: []
  - title: "Does Civilian Oversight Impact Police Legitimacy?"
    authors: "Schiff, Kaylyn Jackson, Daniel S. Schiff, Bryant J. Moy, Joshua McCrain, Scott M. Mourtgos, and Ian T. Adams"
    journal: "Proceedings of the National Academy of Sciences Nexus"
    year: 2025
    doi: "https://doi.org/10.1093/pnasnexus/pgaf267"
    preprint: ""
    abstract: "Does the implementation of external oversight in policing improve public perceptions of police legitimacy? Civilian review boards (CRBs) are frequently promoted as mechanisms to enhance the legitimacy of police agencies by providing independent oversight. Despite public support for CRBs, their adoption and effectiveness remain limited, raising concerns about their actual impact on procedural fairness and police legitimacy. This study assesses the role of CRBs in shaping public perceptions by examining various decision-making scenarios involving police chiefs and CRBs. Using a survey experiment fielded to 2,503 respondents, we investigate whether CRBs enhance legitimacy when they either coincide with or conflict with police chiefs' determinations in cases of officer misconduct. Our findings suggest that while CRBs may enhance perceptions of procedural fairness for some, particularly those with negative views of police, their involvement does not generally increase legitimacy. In fact, when CRBs conflict with police chiefs, they may diminish public trust in both policing and civilian oversight and further entrench politically polarized attitudes towards policing. These results provide empirical evidence to support concerns that CRBs might not fulfill their intended role in enhancing police legitimacy, especially in cases of institutional disagreement."
    discipline: "Public Policy"
    keywords:
      - "Policing"
      - "Public Opinion"
    methods:
      - "Survey Experiments"
