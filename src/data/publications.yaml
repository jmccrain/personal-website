  - title: "Partisanship, Expertise, or Connections? A Conjoint Survey Experiment on Lobbyist Hiring Decisions"
    authors: "Egerod, Benjamin, Hans Hassell, Joshua McCrain, and David Miller"
    journal: "Journal of Law, Economics, and Organizations"
    year: 2024
    doi: "https://doi.org/10.1093/jleo/ewae013"
    preprint: ""
    abstract: "Abstract Lobbyists are important agents of organized interests. While prior studies have investigated the observed hiring patterns of interest groups, conclusions about the demand for lobbyist characteristics may be confounded by the availability of lobbyists with certain characteristics. To assess the demand for lobbyists with expertise, connections, and who share groups’ preferences, we use a conjoint survey experiment to examine the hiring preferences for lobbyists. We find that organized interests prefer lobbyists with policy-specific expertise and the necessary connections to get access to decision-makers, but find little evidence that connections are more valuable than expertise. We also find that organized interests prefer lobbyists who share their political ideology, but that this preference diminishes when the hiring organization is not aligned ideologically with the party in unified control of government. Overall, our study paints a more nuanced picture of the role of preferences and connections in lobbying than many would expect."
    discipline: "Political Science"
    keywords:
      - "Lobbying & Interest Groups"
    methods:
      - "Survey Experiments"
