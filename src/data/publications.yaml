  - title: "Police Reform from the Top Down: Experimental Evidence on Police Executive Support for Civilian Oversight"
    authors: "Adams, Ian, Joshua McCrain, Daniel Schiff, Kaylyn Jackson Schiff, and Scott Mourtgos"
    journal: "Journal of Policy Analysis and Management"
    year: 2024
    doi: "https://doi.org/10.1002/pam.22620"
    preprint: ""
    abstract: "Abstract The accountability of police to the public is imperative for a functioning democracy. The opinions of police executives—pivotal actors for implementing oversight policies—are an understudied, critical component of successful reform efforts. We use a pre‐registered survey experiment administered to all U.S. municipal police chiefs and county sheriffs to assess whether police executives’ attitudes towards civilian oversight are responsive to 1) state‐level public opinion (drawing on an original n = 16,840 survey) and 2) prior adoption of civilian review boards in large agencies. Results from over 1,300 police executives reveal that law enforcement leaders are responsive to elite peer adoption but much less to public opinion, despite overwhelming public support. Compared to appointed municipal police chiefs, elected sheriffs are less likely to support any civilian oversight. Our findings hold implications for reformers: we find that existing civilian oversight regimes are largely popular, and that it is possible to move police executive opinion towards support for civilian oversight."
    discipline: "Public Policy"
    keywords:
