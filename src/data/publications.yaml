  - title: "Descriptive Representation on K Street: Race and Gender Among Federal Lobbyists"
    authors: "Egerod, Benjamin, Hans Hassell, Joshua McCrain, and David Miller"
    journal: "Legislative Studies Quarterly"
    year: 2025
    doi: "https://doi.org/10.1111/lsq.12490"
    preprint: ""
    abstract: "Abstract We provide evidence that there are substantial racial and gender gaps among lobbyists. These gender and racial differences are also greater among conservative leaning groups. However, we show, these gaps are decreasing over time. Does demand for minority and female lobbyists play a role in these trends? Although previous work has highlighted the relative scarcity of women and minorities in positions leading to the lobbyist profession (supply), we know less about whether interest groups are interested in hiring qualified women and minorities for such positions (demand). Using a conjoint experiment embedded in a survey of individuals involved in hiring lobbyists, we find greater demand for female and minority lobbyists than for their male and White counterparts, especially among ideological liberals. Our work shows that the lobbying industry does not appear to discount the candidacies of potential female and minority lobbyists."
    discipline: "Political Science"
    keywords:
