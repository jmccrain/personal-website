  - title: "The Correlates of State Policy and the Structure of State Panel Data"
    authors: "Grossmann, Matt, Marty Jordan, and Joshua McCrain"
    journal: "State Politics and Policy Quarterly"
    year: 2021
    doi: "https://doi.org/10.1017/spq.2021.17"
    preprint: ""
    abstract: "Abstract The American states offer a wealth of variation across time and space to understand the sources, dynamics, and consequences of public policy. As laboratories of socioeconomic and political differences, they enable both wide-scale assessments of change and studies of specific policy choices. To leverage this potential, we constructed and integrated a database of thousands of state-year variables for designing and executing social research: the Correlates of State Policy Project (CSPP). The database offers one-stop shopping for accurate and reliable data, allows researchers to assess the generalizability of the relationships they uncover, enables assessment of causal inferences, and connects state politics researchers to larger research communities. We demonstrate CSPP’s use and breadth, as well as its limitations. Through an applied empirical approach familiar to the state politics literature, we show that researchers should remain attentive to regional variation in key variables and potential lack of within-state variation in independent and dependent variables of interest. By comparing commonly used model specifications, we demonstrate that results are highly sensitive to particular research design choices. Inferences drawn from state politics research largely depend on the nature of over time variation within and across states and the empirical leverage it may or may not provide."
    discipline: "Political Science"
    keywords:
      - "Legislative Politics"
    methods:
      - "Measurement"
  - title: "Local News and National Politics"
    authors: "Martin, Gregory J. and Joshua McCrain"
    journal: "American Political Science Review"
    year: 2019
    doi: "https://doi.org/10.1017/s0003055418000965"
    preprint: ""
    abstract: "The level of journalistic resources dedicated to coverage of local politics is in a long-term decline in the US news media, with readership shifting to national outlets. We investigate whether this trend is demand- or supply-driven, exploiting a recent wave of local television station acquisitions by a conglomerate owner. Using extensive data on local news programming and viewership, we find that the ownership change led to (1) substantial increases in coverage of national politics at the expense of local politics, (2) a significant rightward shift in the ideological slant of coverage, and (3) a small decrease in viewership, all relative to the changes at other news programs airing in the same media markets. These results suggest a substantial supply-side role in the trends toward nationalization and polarization of politics news, with negative implications for accountability of local elected officials and mass polarization."
    discipline: "Political Science"
    keywords:
      - "Media & Politics"
    methods:
      - "Causal Inference"
  - title: "Bounding Partisan Approval Rates Under Endogenous Partisanship"
    authors: "Montagnes, B. Pablo, Zac Peskowitz, and Joshua McCrain"
    journal: "Journal of Politics"
    year: 2019
    doi: "https://doi.org/10.1086/700572"
    preprint: ""
    abstract: "The presidential approval rate among a president’s copartisans has received a great deal of attention and is an important quantity for understanding accountability of the executive branch. We show that the reported composition of the president’s party is endogenous to presidential popularity, with the party growing and becoming more ideologically moderate as presidential popularity increases. As a result, observed partisan approval rates may be biased because of compositional change in respondents who self-identify with the president’s party. We derive bounds on the compositionally corrected partisan approval rate under a theoretically motivated monotonicity condition. We examine how the bounds have evolved during the Obama and Trump presidencies. The proportion of survey respondents who identify with the Republican party has decreased rapidly from the preelection benchmark during the Trump presidency and, as a result, the lower bound on Trump’s partisan approval rate is much lower than at a comparable point in the Obama presidency."
    discipline: "Political Science"
    keywords:
      - "Public Opinion"
    methods:
      - "Measurement"
  - title: "Revolving Door Lobbyists and the Value of Congressional Staff Connections"
    authors: "McCrain, Joshua"
    journal: "Journal of Politics"
    year: 2018
    doi: "https://doi.org/10.1086/698931"
    preprint: ""
    abstract: "Building on previous work on lobbying and relationships in Congress, I propose a theory of staff-to-staff connections as a human capital asset for Capitol Hill staff and revolving door lobbyists. Employing lobbying disclosure data matched to congressional staff employment histories, I find that the connections these lobbyists maintain to their former Hill coworkers primarily drive their higher relative value as lobbyists. Specifically, a 1 standard deviation increase in staff connections predicts an 18% increase in revenue attributed to the lobbyist during her first year. I also find that the indirect connections lobbyists maintain to legislators through knowing a staffer in a legislative office are of potential greater value than a direct connection to a senator given a large enough number of connections. This article sheds additional light onto the political economy of the lobbying industry, making an important contribution to the literature on lobbying and the revolving door phenomenon."
    discipline: "Political Science"
    keywords:
      - "Lobbying & Interest Groups"
      - "Legislative Politics"
    methods:
      - "Causal Inference"
