  - title: "Institutional Factors Driving Citizen Perceptions of AI in Government: Evidence from a Survey Experiment on Policing"
    authors: "Schiff, Kaylyn Jackson, Daniel Schiff, Ian Adams, Joshua McCrain, and Scott Mourtgos"
    journal: "Public Administration Review"
    year: 2024
    doi: "https://doi.org/10.1111/puar.13799"
    preprint: ""
    abstract: "Abstract Law enforcement agencies are increasingly adopting artificial intelligence (AI)‐powered tools. While prior work emphasizes the technological features driving public opinion, we investigate how public trust and support for AI in government vary with the institutional context. We administer a pre‐registered survey experiment to 4200 respondents about AI use cases in policing to measure responsiveness to three key institutional factors: bureaucratic proximity (i.e., local sheriff versus national Federal Bureau of Investigation), algorithmic targets (i.e., public targets via predictive policing versus detecting officer misconduct through automated case review), and agency capacity (i.e., necessary resources and expertise). We find that the public clearly prefers local over national law enforcement use of AI, while reactions to different algorithmic targets are more limited and politicized. However, we find no responsiveness to agency capacity or lack thereof. The findings suggest the need for greater scholarly, practitioner, and public attention to organizational, not only technical, prerequisites for successful government implementation of AI."
    discipline: "Public Policy"
    keywords:
      - "Policing"
      - "AI & Technology"
      - "Public Opinion"
    methods:
      - "Survey Experiments"
  - title: "Local Elections Do Not Increase Demand for Local News"
    authors: "McCrain, Joshua and Erik Peterson"
    journal: "Political Science Research and Methods"
    year: 2024
    doi: "https://doi.org/10.1017/psrm.2023.24"
    preprint: ""
    abstract: "Abstract Anemic demand for local news has contributed to an industry crisis. We consider whether local elections, which highlight the ability of local television stations and newspapers to provide information that is unavailable from national news outlets, increase local media use. While we show these elections are a time of increased attention to local politics in the news and among the public, we also find local media outlets do not benefit from this when considering behavioral news use measures. Relative to news outlets in cities without an election, local television remains substantively unchanged during local elections. Newspaper website traffic is largely stable, although it falls slightly the month after an election. In both cases these differences are small, even when considering close races and those happening off the federal election cycle. This shows limits on the ability of salient local political events to motivate local news use."
    discipline: "Political Science"
    keywords:
      - "Media & Politics"
    methods:
      - "Causal Inference"
  - title: "A foot out the door: what drives bureaucratic exit into lobbying careers?"
    authors: "Bolton, Alexander and Joshua McCrain"
    journal: "Political Science Research and Methods"
    year: 2023
    doi: "https://doi.org/10.1017/psrm.2023.45"
    preprint: ""
    abstract: "Abstract The revolving door is a potential mechanism of private influence over policy. Recent work primarily examines the revolving of legislators and their staff, with little focus on the federal bureaucracy. To analyze decisions to turnover into lobbying, we develop an argument emphasizing the (1) policy expertise acquired from federal employment; (2) the proximity of employees to political decision-making; and (3) the agency policymaking environment. Leveraging federal personnel and lobbying data, we find the first two factors predict revolving whereas the policymaking environment has an inconsistent impact. We highlight the importance of studying selection into lobbying for estimating casual effects of lobbyist characteristics on revenue and contribute to the literature on bureaucratic careers and the nature of private influence in policymaking."
    discipline: "Political Science"
    keywords:
      - "Lobbying & Interest Groups"
    methods: []
  - title: "Software Citations in Political Science"
    authors: "Arel-Bundock, Vincent and Joshua McCrain"
    journal: "PS: Political Science and Politics"
    year: 2023
    doi: "https://doi.org/10.1017/s1049096523000239"
    preprint: ""
    abstract: "ABSTRACT Political scientists rely on complex software to conduct research, and much of the software they use is written and distributed for free by other researchers. This article contends that creating and maintaining these public goods is costly for individual software developers but that it is not adequately incentivized by the academic community. We demonstrate that statistical software is used widely but rarely cited in political science, and we highlight a partial solution to this problem: software bibliographies. To facilitate their creation, we introduce softbib , an R package that scans analysis scripts, detects the software used in those scripts, and automatically creates bibliographies. We hope that recognizing the contribution of software developers to science will encourage more scholars to create public goods, which could yield important downstream benefits."
    discipline: "Political Science"
    keywords: []
    methods: []
  - title: "Public Support for Professional Legislatures"
    authors: "Fortunato, David, Joshua McCrain, and Kaylyn Jackson Schiff"
    journal: "State Politics and Policy Quarterly"
    year: 2023
    doi: "https://doi.org/10.1017/spq.2023.6"
    preprint: ""
    abstract: "Abstract Evidence suggests that well-funded, professional legislatures more effectively provide constituents with their preferred policies and may improve social welfare. Yet, legislative resources across state legislatures have stagnated or dwindled at least in part due to public antagonism toward increasing representatives’ salaries. We argue that one reason voters oppose legislative resources, like salary and staff, is that they are unaware of the potential benefits. Employing a pre-registered survey experiment with a pre–post design, we find that subjects respond positively to potential social welfare benefits of professionalization, increasing support for greater resources. We also find that individuals identifying with the legislative majority party respond positively to potential responsiveness benefits and that out-partisans do not respond negatively to potential responsiveness costs. In a separate survey of political elites, we find similar patterns. These results suggest that a key barrier to increasing legislative professionalism – anticipated public backlash – may not be insurmountable. The findings also highlight a challenge of institutional choice: beliefs that representatives are unresponsive or ineffective lead to governing institutions that may ensure these outcomes."
    discipline: "Political Science"
    keywords:
      - "Legislative Politics"
      - "Public Opinion"
    methods:
      - "Survey Experiments"
  - title: "Lobbyists into Government"
    authors: "Egerod, Benjamin C.K. and Joshua McCrain"
    journal: "Quarterly Journal of Political Science"
    year: 2023
    doi: "https://doi.org/10.1561/100.00021196"
    preprint: ""
    abstract: "Lobbying firms seek access to policymaking by hiring individuals with connections to government officials and with previous experience as government employees. This paper examines a different avenue for access: the transition of a firm’s lobbyists into government roles. We find firms frequently forge connections to government in this manner and their business benefits as a result. Using panel data from 2001 to 2020 of U.S. federal bureaucrats and congressional staff matched to lobbying records, we quantify the value to lobbying firms when their employees enter government service. We find lobbying firms that gain government connections through the departure of one of their lobbyists experience a 36% revenue increase, or roughly $320,000 per year. In examining what drives this increase in revenue, we find firms present connections as a premium service to existing clients and that connections to congressional offices are more valuable than those gained to executive branch agencies. These results shed light onto the business model of lobbying firms and the political economy of the lobbying industry."
    discipline: "Political Science"
    keywords:
      - "Lobbying & Interest Groups"
    methods: []
  - title: "Measuring Dynamic Media Bias"
    authors: "Lelkes, Yphtach, Eunji Kim, and Joshua McCrain"
    journal: "Proceedings of the National Academy of Sciences"
    year: 2022
    doi: "https://doi.org/10.1073/pnas.2202197119"
    preprint: ""
    abstract: "Ideological media bias is increasingly central to the study of politics. Yet, past literature often assumes that the ideological bias of any outlet, at least in the short term, is static and exogenous to the political process. We challenge this assumption. We use longitudinal data from the Stanford Cable News Analyzer (2010 to 2021), which reports the screen time of various political actors on cable news, and quantify the partisan leaning of those actors using their past campaign donation behavior. Using one instantiation of media bias-the mean ideology of political actors on a channel, i.e., visibility bias-we examine weekly, within-day, and program-level estimates of media bias. We find that media bias is highly dynamic even in the short term and that the heightened polarization between TV channels over time was mostly driven by the prime-time shows."
    discipline: "Political Science"
    keywords:
      - "Media & Politics"
    methods:
      - "Text Analysis"
      - "Measurement"
  - title: "Experience, institutions, and candidate emergence: The political career returns to state legislative service"
    authors: "McCrain, Joshua and Stephen D. O'Connell"
    journal: "Political Science Research and Methods"
    year: 2022
    doi: "https://doi.org/10.1017/psrm.2022.16"
    preprint: ""
    abstract: "Abstract More than half of the current members of the US Congress served in their state legislature prior to holding federal office. We quantify the relationship between state legislative service and career progression to Congress. Using close elections for exogenous assignment of political experience across otherwise similar candidates, we show that serving in the state legislature more than doubles an individual's probability of eventually contesting a Congressional seat relative to a similar candidate who lost in a comparable election; it also doubles the individual politician's probability of eventually winning a Congressional seat. State legislatures thus create national politicians out of otherwise marginal political entrants. We then show that the effect of state legislative service on career progression is larger in more professionalized legislatures, highlighting the role of institutions in facilitating political career progression. Our results hold important implications for representation and accountability, and confirm that prevailing institutions can affect political selection via career progression."
    discipline: "Political Science"
    keywords:
      - "Legislative Politics"
    methods:
      - "Causal Inference"
